name: Build and Release

on:
  workflow_dispatch:
    inputs:
      force_release:
        description: Force a release when manually running this workflow
        required: false
        type: boolean
        default: false
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.release_check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get package version
        id: version
        run: echo "version=v$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Check if this push should release
        id: release_check
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_VERSION: ${{ steps.version.outputs.version }}
          FORCE_RELEASE: ${{ github.event.inputs.force_release || 'false' }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$FORCE_RELEASE" = "true" ]; then
            echo "Force release requested from workflow_dispatch"
            echo "should_release=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$EVENT_NAME" != "push" ] || [ "$REF_NAME" != "main" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            previous_version=""
          else
            previous_version="$(git show "${BEFORE_SHA}:package.json" 2>/dev/null | jq -r .version 2>/dev/null || true)"
          fi

          current_version="${CURRENT_VERSION#v}"

          if [ -n "$previous_version" ] && [ "$previous_version" = "$current_version" ]; then
            echo "Version unchanged at $current_version"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git rev-parse "$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "Tag $CURRENT_VERSION already exists"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Version bumped from ${previous_version:-<none>} to $current_version"
          echo "should_release=true" >> $GITHUB_OUTPUT

      - name: Zip extensions
        run: |
          bun run zip &&
          bun run zip:firefox

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: |
            .output/*-chrome.zip
            .output/*-firefox.zip
          if-no-files-found: error
          include-hidden-files: true

      - name: Create release
        if: steps.release_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            .output/*-chrome.zip
            .output/*-firefox.zip

      - name: Submit to Chrome Web Store
        if: steps.release_check.outputs.should_release == 'true'
        continue-on-error: true
        id: chrome_submit
        run: |
          bun run wxt submit \
            --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

      - name: Submit to Firefox Addon Store
        if: steps.release_check.outputs.should_release == 'true'
        continue-on-error: true
        id: firefox_submit
        run: |
          bun run wxt submit \
            --firefox-zip .output/*-firefox.zip \
            --firefox-sources-zip .output/*-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

      - name: Check submission results
        if: steps.release_check.outputs.should_release == 'true'
        run: |
          echo "Chrome submission: ${{ steps.chrome_submit.outcome }}"
          echo "Firefox submission: ${{ steps.firefox_submit.outcome }}"
          if [ "${{ steps.chrome_submit.outcome }}" = "failure" ] && [ "${{ steps.firefox_submit.outcome }}" = "failure" ]; then
            echo "::error::Both store submissions failed"
            exit 1
          elif [ "${{ steps.chrome_submit.outcome }}" = "failure" ]; then
            echo "::warning::Chrome submission failed, but Firefox succeeded"
          elif [ "${{ steps.firefox_submit.outcome }}" = "failure" ]; then
            echo "::warning::Firefox submission failed, but Chrome succeeded"
          else
            echo "::notice::Both submissions succeeded"
          fi
